version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${RAILWAY_PUBLIC_DOMAIN}
      - WEBHOOK_URL=https://${RAILWAY_PUBLIC_DOMAIN}/
      - GENERIC_TIMEZONE=Europe/Berlin 
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data: